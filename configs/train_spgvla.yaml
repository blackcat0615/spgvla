dataset:
  repo_id: repo_smolvla
  root: /root/gpufree-data/lehome/Datasets/example/four_types_merged

policy:
  type: spgvla
  device: cuda
  push_to_hub: false
  
  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]
  
  output_features:
    action:
      type: ACTION
      shape: [12]

output_dir: /root/gpufree-data/lehome/outputs/train/spgvla_exp8_pg_bs_64
batch_size: 64
steps: 30000
save_freq: 10000
log_freq: 100

wandb:
  enable: false